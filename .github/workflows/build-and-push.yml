name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor as Robot
        if: github.repository == 'kyledeanreinford/switchyards-receipt-fetcher' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_USERNAME }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.repository == 'kyledeanreinford/switchyards-receipt-fetcher' && github.event_name == 'push' }}
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/receipts/switchyards-receipt-fetcher:latest
            ${{ secrets.HARBOR_REGISTRY }}/receipts/switchyards-receipt-fetcher:${{ github.sha }}